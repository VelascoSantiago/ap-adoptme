services:
  # 1. Base de Datos (MySQL)
  mysql:
    image: mysql:8.0
    container_name: adoptme_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: adoptme_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Esta línea ejecutará un script para crear las tablas automáticamente
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. Administrador Visual (Adminer)
  adminer:
    image: adminer
    container_name: adoptme_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  # 3. Gestor de Sesiones (Redis)
  redis:
    image: redis:alpine
    container_name: adoptme_redis
    ports:
      - "6379:6379"

  # 4. Backend (Flask)
  flask-app:
    build: ./backend
    container_name: adoptme_flask
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis

  # 5. Proxy Inverso (Nginx)
  nginx:
    image: nginx:alpine
    container_name: adoptme_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask-app

volumes:
  mysql_data:
