events {
    # Nginx puede manejar muchas conexiones a la vez, aquí le definimos un límite básico
    worker_connections 1024;
}

http {
    server {
        # Escuchamos en el puerto 80 (el puerto web por defecto)
        listen 80;

        location / {
            # Redirigimos todo el tráfico al contenedor de Flask (en el puerto 8000)
            proxy_pass http://flask-app:8000;
            
            # Pasamos algunos encabezados útiles para que Flask sepa quién es el cliente original
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

